<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="description" content="매일 바뀌는 나라 한 곳을 거리·방향·근접도 힌트로 6번 안에 맞히는 지리 퍼즐." />
  <title>Worldle — 일일 국가 맞히기</title>

  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="/css/reset.css" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/globe.css" />
  <link rel="stylesheet" href="/css/game.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="starfield" aria-hidden="true"></div>
  <canvas id="globe-canvas" aria-hidden="true"></canvas>
  <div class="globe-veil" aria-hidden="true"></div>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <svg class="brand-globe" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
          <circle cx="16" cy="16" r="13.5" fill="#0e1c24" stroke="currentColor" stroke-width="1.6"/>
          <ellipse cx="16" cy="16" rx="6" ry="13.5" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.65"/>
          <line x1="2.5" y1="16" x2="29.5" y2="16" stroke="currentColor" stroke-width="1.2" opacity="0.65"/>
          <line x1="5.5" y1="9.5" x2="26.5" y2="9.5" stroke="currentColor" stroke-width="1" opacity="0.4"/>
          <line x1="5.5" y1="22.5" x2="26.5" y2="22.5" stroke="currentColor" stroke-width="1" opacity="0.4"/>
        </svg>
        <h1 class="brand-name">Worldle</h1>
      </div>
      <div class="topbar-actions">
        <button id="help-toggle" class="icon-btn" type="button" aria-haspopup="dialog"
                data-i18n-attr="aria-label:help"><span aria-hidden="true">?</span></button>
        <button id="lang-toggle" class="text-btn" type="button">EN</button>
      </div>
    </header>

    <main class="game">
      <p id="puzzle-meta" class="puzzle-meta"></p>

      <ol id="guess-board" class="board" aria-label="guesses"></ol>

      <form id="guess-form" class="guess-form" autocomplete="off">
        <div class="combo">
          <input
            id="guess-input"
            class="guess-input"
            type="text"
            role="combobox"
            aria-expanded="false"
            aria-autocomplete="list"
            aria-controls="suggestions"
            data-i18n-attr="placeholder:inputPlaceholder"
            placeholder="국가명 입력"
            spellcheck="false"
            autocapitalize="off"
            enterkeyhint="go"
          />
          <ul id="suggestions" class="suggestions" role="listbox" hidden></ul>
        </div>
        <button id="guess-submit" class="submit-btn" type="submit" data-i18n="guess">추측</button>
      </form>

      <p id="message" class="message" role="status"></p>

      <section id="endgame" class="endgame" role="region" aria-labelledby="endgame-title" tabindex="-1" hidden>
        <p id="endgame-title" class="endgame-title"></p>
        <div class="endgame-actions">
          <button id="share-btn" class="submit-btn" type="button" data-i18n="share">결과 공유</button>
        </div>
        <p class="next-label" data-i18n="nextPuzzle">다음 퍼즐까지</p>
        <p id="countdown" class="countdown">--:--:--</p>
      </section>
    </main>

    <footer class="footnote">
      <span data-i18n="footnote">거리·방향·근접도만으로 추리하세요.</span>
      <span class="copyright">© 2026 Worldle All rights reserved</span>
    </footer>
  </div>

  <dialog id="help-dialog" class="help-dialog" aria-labelledby="help-title">
    <form method="dialog" class="help-inner">
      <h2 id="help-title" data-i18n="howToTitle">플레이 방법</h2>
      <ul class="help-list">
        <li data-i18n="howTo1">매일 전 세계 공통으로 정답 국가 한 곳이 정해집니다.</li>
        <li data-i18n="howTo2">국가명을 추측하면 정답까지의 거리, 방향, 근접도를 알려줍니다.</li>
        <li data-i18n="howTo3">근접도 100%에 가까울수록 정답에 가깝습니다.</li>
        <li data-i18n="howTo4">6번 안에 정답 국가를 맞히세요.</li>
      </ul>
      <button class="submit-btn" value="close" data-i18n="close">닫기</button>
    </form>
  </dialog>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
